; Hall test threshold configuration
; Deploy to /userdata/hall_threshold.ini on target

[hall_threshold]
; 27R horizontal hall test: magnetic field strength thresholds (mT)
max_field_min      = 20.0
variation_min      = 20.0

; 21R vertical hall test (GPIO limit detection)
upper_limit_gpio = 181
lower_limit_gpio = 182
